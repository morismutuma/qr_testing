version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mpesa_qr_postgres
    restart: always
    environment:
      POSTGRES_DB: qr_payment_system
      POSTGRES_USER: qr_user
      POSTGRES_PASSWORD: secure_postgres_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qr_user -d qr_payment_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpesa_qr_backend
    restart: always
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - SECRET_KEY=django-insecure-prod-key-please-replace-in-env-file
      - DEBUG=False
- ALLOWED_HOSTS=realedgeadventure.com,localhost,backend,127.0.0.1
      - CORS_ALLOWED_ORIGINS=https://realedgeadventure.com,http://localhost
      # Safaricom Daraja Sandbox credentials (override these in your live environment using system vars)
      - DARAJA_ENV=sandbox
      - DARAJA_CONSUMER_KEY=placeholder_replace_me
      - DARAJA_CONSUMER_SECRET=placeholder_replace_me
      - DARAJA_BUSINESS_SHORTCODE=174379
      - DARAJA_PASSKEY=bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919
      - DARAJA_CALLBACK_URL=https://realedgeadventure.com/api/payments/mpesa/callback/
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mpesa_qr_frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
