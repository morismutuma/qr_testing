server {
    listen 80;
    server_name realedgeventure.com localhost;

    # Frontend static files compiled by Vite React App
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxying
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for Safaricom Daraja calls
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Django Admin Portal proxying
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend static files collected (Django Admin CSS/JS)
    location /static/ {
        alias /app/static/;
    }

    # Backend media files uploaded
    location /media/ {
        alias /app/media/;
    }

    # Enable gzip compression for better page load speed
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";
}
